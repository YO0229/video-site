# Apache HTTPD TLS + security headers baseline
# Enable modules: ssl headers rewrite

<VirtualHost *:80>
    ServerName video.example.com
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName video.example.com
    DocumentRoot "/var/www/video-site"

    SSLEngine on
    SSLCertificateFile "/etc/letsencrypt/live/video.example.com/fullchain.pem"
    SSLCertificateKeyFile "/etc/letsencrypt/live/video.example.com/privkey.pem"

    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLHonorCipherOrder off
    SSLCompression off
    SSLSessionTickets off

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"

    <Directory "/var/www/video-site">
        AllowOverride None
        Require all granted
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
    </Directory>

    ErrorLog  "logs/video-site-error.log"
    CustomLog "logs/video-site-access.log" combined
</VirtualHost>