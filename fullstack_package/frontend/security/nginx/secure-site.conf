# Nginx security baseline for static site + optional /api proxy
# Replace: video.example.com, cert paths, root path, upstream api

limit_req_zone $binary_remote_addr zone=site_ratelimit:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name video.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name video.example.com;

    root /var/www/video-site;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/video.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # General DoS throttle
    limit_req zone=site_ratelimit burst=30 nodelay;

    # Deny hidden files and sensitive extensions
    location ~ /\.|(\.env|\.sql|\.bak|\.old|\.log)$ {
        deny all;
        return 403;
    }

    # Static site
    location / {
        try_files $uri $uri/ /index.html;
        limit_except GET HEAD { deny all; }
    }

    # Optional API reverse proxy hardening
    location /api/ {
        limit_req zone=api_ratelimit burst=20 nodelay;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # only allow common API methods
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$ ) {
            return 405;
        }
    }

    access_log /var/log/nginx/video-site.access.log;
    error_log /var/log/nginx/video-site.error.log warn;
}