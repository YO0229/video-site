# Local ModSecurity overrides
# Requires: libapache2-mod-security2 or nginx modsecurity connector + OWASP CRS

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# Restrict upload size to reduce abuse
SecRequestBodyLimit 104857600
SecRequestBodyNoFilesLimit 262144

# Block common local file inclusion probes
SecRule ARGS|REQUEST_URI "@rx (\.\./|%2e%2e%2f|/etc/passwd|/proc/self/environ)" \
    "id:100100,phase:2,deny,status:403,log,msg:'Possible LFI probe'"

# Block basic SQLi keywords in query and body
SecRule ARGS|REQUEST_URI "@rx (?i)(union\s+select|sleep\(|benchmark\()" \
    "id:100101,phase:2,deny,status:403,log,msg:'Possible SQLi probe'"

# Block XSS payload markers
SecRule ARGS|REQUEST_URI "@rx (?i)(<script|javascript:|onerror\s*=)" \
    "id:100102,phase:2,deny,status:403,log,msg:'Possible XSS probe'"